{% extends "base.html" %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-brand">PIT</div>
        <div class="auth-title">Create account</div>
        <div class="auth-sub">start tracking your portfolio</div>

        {% if error %}
        <div class="alert">{{ error }}</div>
        {% endif %}

        <form action="/register" method="post">
            <div class="field">
                <input type="text" name="username" placeholder="choose a username" required autocomplete="off">
            </div>
            <div class="field">
                <input type="password" name="password" placeholder="choose a password" required>
            </div>
            <button type="submit" class="btn-full">Create Account →</button>
        </form>

        <div class="auth-footer">
            have an account? <a href="/login">sign in</a>
        </div>
    </div>
</div>
{% endblock %}
